<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1100"
     fill="none" stroke="currentColor"
     stroke-linecap="square" stroke-linejoin="miter" stroke-miterlimit="2">

  <!-- ═══ Background decorative layer ═══════════════════════════════ -->

  <!-- Big filled hexagons -->
  <g fill="currentColor" stroke="none" opacity=".85">
    <polygon points="180,330 232,360 232,420 180,450 128,420 128,360"/>
    <polygon points="568,720 608,743 608,789 568,812 528,789 528,743"/>
    <polygon points="600,210 624,224 624,250 600,264 576,250 576,224"/>
  </g>

  <!-- Outlined hexagons -->
  <g stroke-width="3" opacity=".7">
    <polygon points="540,940 580,963 580,1007 540,1030 500,1007 500,963"/>
    <polygon points="100,820 132,839 132,877 100,896 68,877 68,839"/>
    <polygon points="450,250 478,266 478,300 450,316 422,300 422,266"/>
    <polygon points="608,640 632,654 632,680 608,694 584,680 584,654"/>
  </g>

  <!-- Honeycomb dot clusters -->
  <g fill="currentColor" stroke="none" opacity=".55">
    <!-- Cluster A near (130, 480) -->
    <circle cx="130" cy="465" r="3"/><circle cx="143" cy="473" r="3"/>
    <circle cx="143" cy="488" r="3"/><circle cx="130" cy="495" r="3"/>
    <circle cx="117" cy="488" r="3"/><circle cx="117" cy="473" r="3"/>
    <circle cx="130" cy="480" r="3"/>
    <!-- Cluster B near (610, 880) -->
    <circle cx="610" cy="865" r="3"/><circle cx="623" cy="873" r="3"/>
    <circle cx="623" cy="888" r="3"/><circle cx="610" cy="895" r="3"/>
    <circle cx="597" cy="888" r="3"/><circle cx="597" cy="873" r="3"/>
    <circle cx="610" cy="880" r="3"/>
    <!-- Cluster C near (90, 200) -->
    <circle cx="90"  cy="185" r="3"/><circle cx="103" cy="193" r="3"/>
    <circle cx="103" cy="208" r="3"/><circle cx="90"  cy="215" r="3"/>
    <circle cx="77"  cy="208" r="3"/><circle cx="77"  cy="193" r="3"/>
    <circle cx="90"  cy="200" r="3"/>
  </g>

  <!-- Capacitor / chip-cap rectangles -->
  <g fill="currentColor" stroke="none">
    <rect x="60"  y="970" width="14" height="6"/>
    <rect x="624" y="600" width="14" height="6"/>
    <rect x="80"  y="380" width="14" height="6" opacity=".7"/>
    <rect x="618" y="420" width="6"  height="14"/>
    <rect x="50"  y="700" width="6"  height="14" opacity=".7"/>
    <rect x="600" y="350" width="14" height="6"/>
    <rect x="100" y="900" width="6"  height="14" opacity=".7"/>
  </g>

  <!-- ═══ Main PCB traces ═══════════════════════════════════════════ -->

  <!-- Solid trace, milestones 1-5, ending at left edge of central chip -->
  <path d="M 140 1056 H 262 L 350 968
           H 458 L 546 880
           L 436 770 H 392
           H 256 L 168 682
           L 245 605 H 294" stroke-width="9"/>

  <!-- Dashed trace, exit chip right pin to milestones 7-10 -->
  <path d="M 406 569 H 461 L 546 484
           L 425 363 H 350
           H 253 L 154 264
           L 286 132 H 350"
        stroke-width="9" stroke-dasharray="6 10" opacity=".55"/>

  <!-- Branch traces ending in vias -->
  <g stroke-width="4" opacity=".7">
    <path d="M 350 968 V 940"/>
    <path d="M 168 682 V 644"/>
    <path d="M 546 484 H 600 V 460"/>
    <path d="M 350 363 V 333 H 380"/>
    <path d="M 154 264 V 224"/>
    <path d="M 350 132 H 410"/>
    <path d="M 392 770 V 740 H 360"/>
  </g>
  <g fill="currentColor" stroke="none" opacity=".7">
    <circle cx="350" cy="940" r="4"/>
    <circle cx="168" cy="644" r="4"/>
    <circle cx="600" cy="460" r="4"/>
    <circle cx="380" cy="333" r="4"/>
    <circle cx="154" cy="224" r="4"/>
    <circle cx="410" cy="132" r="4"/>
    <circle cx="360" cy="740" r="4"/>
  </g>

  <!-- Test point crosshairs -->
  <g stroke-width="3" opacity=".55">
    <path d="M 60 920 V 940 M 50 930 H 70"/>
    <path d="M 620 760 V 780 M 610 770 H 630"/>
    <path d="M 80 480 V 500 M 70 490 H 90"/>
    <path d="M 620 340 V 360 M 610 350 H 630"/>
    <path d="M 60 180 V 200 M 50 190 H 70"/>
  </g>

  <!-- ═══ HUD-segmented milestone rings (9 of them, milestone 6 = chip) ═══ -->

  <!-- M1 -->
  <circle cx="140" cy="1056" r="28" stroke-width="2"/>
  <circle cx="140" cy="1056" r="20" stroke-width="5" stroke-dasharray="14 6"/>
  <!-- M2 -->
  <circle cx="350" cy="968" r="28" stroke-width="2"/>
  <circle cx="350" cy="968" r="20" stroke-width="5" stroke-dasharray="22 6 6 6"/>
  <!-- M3 -->
  <circle cx="546" cy="880" r="28" stroke-width="2"/>
  <circle cx="546" cy="880" r="20" stroke-width="5" stroke-dasharray="10 4 18 4"/>
  <!-- M4 -->
  <circle cx="392" cy="770" r="28" stroke-width="2"/>
  <circle cx="392" cy="770" r="20" stroke-width="5" stroke-dasharray="14 6"/>
  <!-- M5 -->
  <circle cx="168" cy="682" r="28" stroke-width="2"/>
  <circle cx="168" cy="682" r="20" stroke-width="5" stroke-dasharray="6 4 14 4"/>
  <!-- M7 -->
  <circle cx="546" cy="484" r="28" stroke-width="2"/>
  <circle cx="546" cy="484" r="20" stroke-width="5" stroke-dasharray="10 4 18 4"/>
  <!-- M8 -->
  <circle cx="350" cy="363" r="28" stroke-width="2"/>
  <circle cx="350" cy="363" r="20" stroke-width="5" stroke-dasharray="14 6"/>
  <!-- M9 -->
  <circle cx="154" cy="264" r="28" stroke-width="2"/>
  <circle cx="154" cy="264" r="20" stroke-width="5" stroke-dasharray="22 6 6 6"/>
  <!-- M10 -->
  <circle cx="350" cy="132" r="28" stroke-width="2"/>
  <circle cx="350" cy="132" r="20" stroke-width="5" stroke-dasharray="10 4 18 4"/>

  <!-- ═══ Central CPU chip — replaces milestone 6 visual ═══════════ -->

  <!-- Chip body -->
  <rect x="306" y="539" width="88" height="88" stroke-width="4"/>
  <!-- Inner die -->
  <rect x="322" y="555" width="56" height="56" stroke-width="2"/>
  <!-- Die corner notch (orientation marker) -->
  <circle cx="332" cy="565" r="3" fill="currentColor" stroke="none"/>

  <!-- Chip pins -->
  <g fill="currentColor" stroke="none">
    <!-- Top -->
    <rect x="316" y="525" width="6" height="14"/><rect x="332" y="525" width="6" height="14"/>
    <rect x="362" y="525" width="6" height="14"/><rect x="378" y="525" width="6" height="14"/>
    <!-- Bottom -->
    <rect x="316" y="627" width="6" height="14"/><rect x="332" y="627" width="6" height="14"/>
    <rect x="362" y="627" width="6" height="14"/><rect x="378" y="627" width="6" height="14"/>
    <!-- Left -->
    <rect x="294" y="555" width="12" height="6"/><rect x="294" y="571" width="12" height="6"/>
    <rect x="294" y="589" width="12" height="6"/><rect x="294" y="605" width="12" height="6"/>
    <!-- Right -->
    <rect x="394" y="555" width="12" height="6"/><rect x="394" y="571" width="12" height="6"/>
    <rect x="394" y="589" width="12" height="6"/><rect x="394" y="605" width="12" height="6"/>
  </g>

  <!-- Edge ground hatching -->
  <g stroke-width="2" stroke-dasharray="2 6" opacity=".35">
    <path d="M 30 1080 H 130"/><path d="M 590 1080 H 670"/>
    <path d="M 30 30 H 130"/>  <path d="M 590 30 H 670"/>
  </g>
</svg>

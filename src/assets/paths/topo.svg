<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1100"
     fill="none" stroke="currentColor"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- ── Echo contour lines (faint, parallel-ish) ─────────────────── -->
  <g stroke-width="2" opacity=".35">
    <path d="M 60 1020 C 160 980, 280 970, 360 940 C 460 900, 540 880, 620 850"/>
    <path d="M 620 720 C 480 700, 350 720, 220 680 C 130 650, 60 600, 90 560"/>
    <path d="M 80 380 C 200 340, 310 320, 380 290 C 470 260, 560 220, 640 190"/>
    <path d="M 620 1010 C 540 1000, 480 1020, 460 1040"/>
    <path d="M 80 760 C 130 740, 200 760, 250 740"/>
    <path d="M 480 540 C 540 500, 600 510, 640 480"/>
  </g>

  <!-- ── Solid main trail (cleared half) ──────────────────────────── -->
  <path d="M 140 1056
           C 220 1010, 280 990, 350 968
           C 420 950, 480 920, 546 880
           C 510 830, 450 790, 392 770
           C 320 760, 220 720, 168 682
           C 220 650, 290 600, 350 583"
        stroke-width="12"/>

  <!-- ── Dotted unreached half ────────────────────────────────────── -->
  <path d="M 350 583
           C 420 565, 490 530, 546 484
           C 500 440, 410 400, 350 363
           C 290 340, 200 300, 154 264
           C 210 220, 290 170, 350 132"
        stroke-width="11" stroke-dasharray="2 9" opacity=".60"/>

  <!-- ── Milestone rings ──────────────────────────────────────────── -->
  <g stroke-width="5">
    <circle cx="140" cy="1056" r="28"/>
    <circle cx="350" cy="968"  r="28"/>
    <circle cx="546" cy="880"  r="28"/>
    <circle cx="392" cy="770"  r="28"/>
    <circle cx="168" cy="682"  r="28"/>
    <circle cx="350" cy="583"  r="28"/>
    <circle cx="546" cy="484"  r="28"/>
    <circle cx="350" cy="363"  r="28"/>
    <circle cx="154" cy="264"  r="28"/>
    <circle cx="350" cy="132"  r="28"/>
  </g>

  <!-- ── Tiny topographic glyphs (waypoints) ─────────────────────── -->
  <g stroke-width="2.5" opacity=".55">
    <path d="M 60 900 l 0 10 m -5 -5 l 10 0"/>
    <path d="M 630 700 l 0 10 m -5 -5 l 10 0"/>
    <path d="M 70 470 l 0 10 m -5 -5 l 10 0"/>
    <path d="M 610 250 l 0 10 m -5 -5 l 10 0"/>
    <circle cx="600" cy="900" r="3" fill="currentColor" stroke="none"/>
    <circle cx="100" cy="600" r="3" fill="currentColor" stroke="none"/>
    <circle cx="600" cy="380" r="3" fill="currentColor" stroke="none"/>
    <circle cx="100" cy="180" r="3" fill="currentColor" stroke="none"/>
  </g>
</svg>

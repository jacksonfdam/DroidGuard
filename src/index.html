<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0E27" />
  <meta name="description" content="DroidGuard Quest — from vulnerability to fortress. Your Android security journey, gamified." />
  <title>DroidGuard Quest</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DroidGuard" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Loaded synchronously and as early as possible so console blocking
       and tamper checks are in place before any other code runs. -->
  <script src="js/anti-tamper.js"></script>
</head>
<body>
  <div id="app">
    <!-- Top bar (HUD) -->
    <header class="hud" id="hud">
      <button class="hud__brand" id="btnHome" title="Back to map" aria-label="DroidGuard Quest — back to map">
        <svg class="hud__logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="dgLogoGrad" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#00FF88"/>
              <stop offset="1" stop-color="#00D4FF"/>
            </linearGradient>
          </defs>
          <path d="M32 6 L54 14 V30 C54 44 44 56 32 60 C20 56 10 44 10 30 V14 Z"
                fill="none" stroke="url(#dgLogoGrad)" stroke-width="3.2" stroke-linejoin="round"/>
          <path d="M22 32 L29 39 L42 24"
                fill="none" stroke="url(#dgLogoGrad)" stroke-width="3.2"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="14" r="1.6" fill="url(#dgLogoGrad)"/>
          <circle cx="44" cy="14" r="1.6" fill="url(#dgLogoGrad)"/>
        </svg>
        <span class="hud__brand-name">DroidGuard<span class="hud__brand-name--accent">Quest</span></span>
      </button>

      <div class="hud__stats">
        <div class="hud__chip" title="Current player level">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"
                  fill="currentColor"/>
          </svg>
          <span>LV <strong id="hudLevel">1</strong></span>
        </div>
        <div class="hud__chip" title="Experience points">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M8 12l3 3 5-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span><strong id="hudXp">0</strong> XP</span>
        </div>
        <div class="hud__chip" title="Total stars">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z" fill="currentColor"/>
          </svg>
          <span><strong id="hudStars">0</strong>/50</span>
        </div>
      </div>

      <div class="hud__nav">
        <button class="hud__btn" id="btnCodex" title="Codex (bonus library)" aria-label="Codex">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4z"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M5 4v13a3 3 0 0 0 3 3h11" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 8h6M9 12h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="hud__btn" id="btnAbout" title="About & guide" aria-label="About and guide">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M12 11v5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <circle cx="12" cy="7.5" r="1.2" fill="currentColor"/>
          </svg>
        </button>
        <button class="hud__btn" id="btnCredits" title="Credits" aria-label="Credits">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.4-1 .9-1 1.7v.5"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="1.1" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Views container -->
    <main id="view"></main>

    <!-- Shared modal -->
    <div class="modal" id="modal" aria-hidden="true" role="dialog">
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel" id="modalPanel" role="document"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/library.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/integrity.js"></script>
  <script src="js/state.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/map.js"></script>
  <script src="js/splash.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
